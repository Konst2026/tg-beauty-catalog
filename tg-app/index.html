<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <title>BeautyBook</title>

  <!-- Telegram Web App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Стили приложения -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Корневой контейнер -->
  <div id="app">
    <!-- Сюда рендерятся все экраны (один активный .screen) -->
    <div id="screen-container"></div>

    <!-- Нижняя навигационная панель (скрыта на экранах бронирования) -->
    <nav id="tab-bar" class="hidden"></nav>
  </div>

  <!-- Тост-уведомления -->
  <div id="toast" aria-live="polite"></div>

  <!-- Скрипты в правильном порядке зависимостей -->
  <script src="data.js"></script>
  <script src="screens-client.js"></script>
  <script src="screens-master.js"></script>
  <script src="events.js"></script>
  <script src="app.js"></script>

</body>
</html>
