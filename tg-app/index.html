<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <title>BeautyBook</title>

  <!-- Telegram Web App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Глобальные стили -->
  <link rel="stylesheet" href="styles.css" />
  <!-- Стили клиентских экранов -->
  <link rel="stylesheet" href="src/screens/client/client.css" />
  <!-- Стили кабинета мастера -->
  <link rel="stylesheet" href="src/screens/master/master.css" />
</head>
<body>

  <div id="app">
    <div id="screen-container"></div>
    <nav id="tab-bar" class="hidden"></nav>
  </div>

  <div id="toast" aria-live="polite"></div>

  <div id="offer-modal" class="offer-backdrop hidden">
    <div class="offer-card">
      <div class="offer-emoji">🎁</div>
      <div class="offer-title">Скидка 15% на первую запись</div>
      <div class="offer-sub">Подпишитесь на бота — получите промокод в личное сообщение</div>
      <ul class="offer-bullets">
        <li>Напомним о записи за день</li>
        <li>Первыми узнаёте о свободных окошках</li>
        <li>Эксклюзивные акции для подписчиков</li>
      </ul>
      <button class="offer-btn" id="btn-offer-get">Получить скидку 15%</button>
      <button class="offer-skip" id="btn-offer-skip">Пропустить</button>
    </div>
  </div>

  <!-- Порядок загрузки важен: каждый файл зависит от предыдущих -->
  <script src="src/api/data.js"></script>
  <script src="src/screens/client/client.js"></script>
  <script src="src/screens/master/master.js"></script>
  <script src="src/utils/events.js"></script>
  <script src="src/app.js"></script>

</body>
</html>
